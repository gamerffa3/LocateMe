<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocateMe - Track Your Phone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            margin: 80px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-container h2 {
            text-align: center;
            color: #2196F3;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .login-container p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        input:focus {
            border-color: #2196F3;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #1976D2;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            background: #ffebee;
            border-radius: 8px;
        }
        .dashboard {
            display: none;
        }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h2 {
            color: #2196F3;
        }
        .live-badge {
            background: #ff4444;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .info-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .location-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .location-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .location-card .label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .location-card .value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        #map {
            height: 400px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn-refresh {
            background: #4CAF50;
            width: auto;
            padding: 10px 20px;
        }
        .btn-logout {
            background: #f44336;
            width: auto;
            padding: 10px 20px;
        }
        .status {
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .online {
            background: #d4edda;
            color: #155724;
        }
        .offline {
            background: #f8d7da;
            color: #721c24;
        }
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        @media (max-width: 768px) {
            .login-container {
                margin: 40px 15px;
                padding: 25px;
            }
            #map {
                height: 300px;
            }
        }
        .loading {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2196F3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Section -->
    <div id="loginSection" class="login-container">
        <h2>🔒 LocateMe</h2>
        <p>Track your lost phone in real-time</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="pin" placeholder="4-6 Digit PIN" maxlength="6">
        <button onclick="login()">📍 Find My Phone</button>
        <div id="loginError" class="error" style="display:none;"></div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="dashboard">
        <div class="header">
            <h2>📍 LocateMe Tracker</h2>
            <span class="live-badge">● LIVE</span>
        </div>
        <div class="info-card">
            <h3>📱 Device Location</h3>
            <div class="location-grid">
                <div class="location-card">
                    <div class="label">Username</div>
                    <div class="value" id="displayUsername">-</div>
                </div>
                <div class="location-card">
                    <div class="label">Latitude</div>
                    <div class="value" id="displayLat">-</div>
                </div>
                <div class="location-card">
                    <div class="label">Longitude</div>
                    <div class="value" id="displayLng">-</div>
                </div>
                <div class="location-card">
                    <div class="label">Last Updated</div>
                    <div class="value" id="displayTime">-</div>
                </div>
            </div>
            <div id="map"></div>
            <div class="controls">
                <button class="btn-refresh" onclick="fetchLocation()">🔄 Refresh Now</button>
                <button class="btn-logout" onclick="logout()">🚪 Logout</button>
            </div>
            <div class="auto-refresh">
                <input type="checkbox" id="autoRefresh" checked>
                <label>Auto refresh every 5 seconds</label>
            </div>
            <div id="statusMessage" class="status online">✅ Connected - Waiting for location data</div>
        </div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<!-- Google Maps API - NOTE: You need to add your own API key -->
<!-- Get free API key from: https://console.cloud.google.com -->
<script>
    // ============================================
    // 🔥 FIREBASE CONFIGURATION - YOUR DATA
    // ============================================
    const firebaseConfig = {
        apiKey: "AIzaSyDJLDWlFVTJmvlirJSbFwVNq5oDFOt909Y",
        authDomain: "locateme-448db.firebaseapp.com",
        databaseURL: "https://locateme-448db-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "locateme-448db",
        storageBucket: "locateme-448db.firebasestorage.app",
        messagingSenderId: "925140869620",
        appId: "1:925140869620:web:f4038374a0c8ad706ed9a1",
        measurementId: "G-6KQQ3NG32X"
    };

    // Initialize Firebase
    let database;
    try {
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        console.log("✅ Firebase connected successfully!");
    } catch (error) {
        console.error("❌ Firebase initialization error:", error);
    }

    // Global variables
    let map = null;
    let marker = null;
    let refreshInterval = null;
    let currentUsername = "";

    // ============================================
    // LOGIN FUNCTION
    // ============================================
    async function login() {
        const username = document.getElementById('username').value.trim();
        const pin = document.getElementById('pin').value.trim();
        const errorDiv = document.getElementById('loginError');

        if (!username || !pin) {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "❌ Please enter username and PIN";
            return;
        }

        if (!database) {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "❌ Firebase not connected. Please check your internet connection.";
            return;
        }

        errorDiv.style.display = "block";
        errorDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Verifying...</p></div>';
        errorDiv.style.textAlign = "center";

        try {
            const snapshot = await database.ref('users/' + username).once('value');
            const userData = snapshot.val();

            if (userData && userData.pin === pin) {
                currentUsername = username;
                document.getElementById('displayUsername').innerHTML = username;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                
                initMap();
                await fetchLocation();
                startAutoRefresh();
                
                errorDiv.style.display = "none";
            } else {
                errorDiv.style.display = "block";
                errorDiv.innerHTML = "❌ Invalid username or PIN";
                errorDiv.style.textAlign = "center";
            }
        } catch (error) {
            console.error("Login error:", error);
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "❌ Connection error: " + error.message;
            errorDiv.style.textAlign = "center";
        }
    }

    // ============================================
    // MAP FUNCTIONS
    // ============================================
    function initMap() {
        const defaultLocation = { lat: 28.6139, lng: 77.2090 };
        
        // Check if Google Maps is loaded
        if (typeof google === 'undefined') {
            console.log("Waiting for Google Maps to load...");
            setTimeout(initMap, 500);
            return;
        }
        
        map = new google.maps.Map(document.getElementById('map'), {
            center: defaultLocation,
            zoom: 15,
            zoomControl: true,
            mapTypeControl: false
        });
        
        marker = new google.maps.Marker({
            position: defaultLocation,
            map: map,
            title: 'Your Device',
            icon: {
                url: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
                scaledSize: new google.maps.Size(40, 40)
            }
        });
    }

    // ============================================
    // FETCH LOCATION FROM FIREBASE
    // ============================================
    async function fetchLocation() {
        if (!currentUsername || !database) return;

        try {
            const snapshot = await database.ref('users/' + currentUsername).once('value');
            const userData = snapshot.val();

            if (userData && userData.lat && userData.lng) {
                const lat = userData.lat;
                const lng = userData.lng;
                const lastUpdate = userData.lastUpdate;

                document.getElementById('displayLat').innerHTML = lat.toFixed(6);
                document.getElementById('displayLng').innerHTML = lng.toFixed(6);
                
                if (lastUpdate) {
                    const date = new Date(lastUpdate);
                    document.getElementById('displayTime').innerHTML = date.toLocaleString('en-IN');
                    
                    const minutesAgo = (Date.now() - lastUpdate) / 60000;
                    const statusDiv = document.getElementById('statusMessage');
                    
                    if (minutesAgo < 1) {
                        statusDiv.className = 'status online';
                        statusDiv.innerHTML = `✅ Online - Location updated ${Math.floor(minutesAgo * 60)} seconds ago`;
                    } else if (minutesAgo < 5) {
                        statusDiv.className = 'status online';
                        statusDiv.innerHTML = `⚠️ Last update ${Math.floor(minutesAgo)} minutes ago`;
                    } else {
                        statusDiv.className = 'status offline';
                        statusDiv.innerHTML = `❌ Offline - No update for ${Math.floor(minutesAgo)} minutes`;
                    }
                }

                if (map && marker) {
                    const location = { lat: lat, lng: lng };
                    map.setCenter(location);
                    marker.setPosition(location);
                    
                    marker.setAnimation(google.maps.Animation.BOUNCE);
                    setTimeout(() => marker.setAnimation(null), 1000);
                }
            } else {
                document.getElementById('statusMessage').className = 'status offline';
                document.getElementById('statusMessage').innerHTML = '⚠️ Waiting for location data from device...';
            }
        } catch (error) {
            console.error('Fetch error:', error);
            document.getElementById('statusMessage').className = 'status offline';
            document.getElementById('statusMessage').innerHTML = '❌ Error fetching data';
        }
    }

    // ============================================
    // AUTO REFRESH
    // ============================================
    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        
        refreshInterval = setInterval(() => {
            const autoRefresh = document.getElementById('autoRefresh');
            if (autoRefresh && autoRefresh.checked) {
                fetchLocation();
            }
        }, 5000);
    }

    // ============================================
    // LOGOUT FUNCTION
    // ============================================
    function logout() {
        if (refreshInterval) {
            clearInterval(refreshInterval);
            refreshInterval = null;
        }
        
        currentUsername = "";
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('username').value = "";
        document.getElementById('pin').value = "";
        document.getElementById('loginError').style.display = "none";
    }

    // Check if everything is loaded
    window.addEventListener('load', function() {
        console.log("✅ Website loaded successfully");
        if (database) {
            console.log("✅ Firebase is ready");
        } else {
            console.log("❌ Firebase not initialized");
        }
    });
</script>

<!-- Google Maps API - You need to add your API key here -->
<!-- Get free API key from: https://console.cloud.google.com -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE"></script>

</body>
</html>
