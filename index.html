<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocateMe - Track Your Phone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            margin: 80px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-container h2 {
            text-align: center;
            color: #2196F3;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .login-container p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        input:focus {
            border-color: #2196F3;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #1976D2;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            background: #ffebee;
            border-radius: 8px;
        }
        .dashboard {
            display: none;
        }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h2 {
            color: #2196F3;
        }
        .live-badge {
            background: #ff4444;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .info-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .location-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .location-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .location-card .label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .location-card .value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        #map {
            height: 400px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn-refresh {
            background: #4CAF50;
            width: auto;
            padding: 10px 20px;
        }
        .btn-logout {
            background: #f44336;
            width: auto;
            padding: 10px 20px;
        }
        .status {
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .online {
            background: #d4edda;
            color: #155724;
        }
        .offline {
            background: #f8d7da;
            color: #721c24;
        }
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        @media (max-width: 768px) {
            .login-container {
                margin: 40px 15px;
                padding: 25px;
            }
            #map {
                height: 300px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Section -->
    <div id="loginSection" class="login-container">
        <h2>🔒 LocateMe</h2>
        <p>Track your lost phone in real-time</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="pin" placeholder="4-6 Digit PIN" maxlength="6">
        <button onclick="login()">📍 Find My Phone</button>
        <div id="loginError" class="error" style="display:none;"></div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="dashboard">
        <div class="header">
            <h2>📍 LocateMe Tracker</h2>
            <span class="live-badge">● LIVE</span>
        </div>
        <div class="info-card">
            <h3>📱 Device Location</h3>
            <div class="location-grid">
                <div class="location-card">
                    <div class="label">Username</div>
                    <div class="value" id="displayUsername">-</div>
                </div>
                <div class="location-card">
                    <div class="label">Latitude</div>
                    <div class="value" id="displayLat">-</div>
                </div>
                <div class="location-card">
                    <div class="label">Longitude</div>
                    <div class="value" id="displayLng">-</div>
                </div>
                <div class="location-card">
                    <div class="label">Last Updated</div>
                    <div class="value" id="displayTime">-</div>
                </div>
            </div>
            <div id="map"></div>
            <div class="controls">
                <button class="btn-refresh" onclick="fetchLocation()">🔄 Refresh</button>
                <button class="btn-logout" onclick="logout()">🚪 Logout</button>
            </div>
            <div class="auto-refresh">
                <input type="checkbox" id="autoRefresh" checked>
                <label>Auto refresh (5 sec)</label>
            </div>
            <div id="statusMessage" class="status online">✅ Waiting for location...</div>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<!-- Google Maps API - REPLACE WITH YOUR KEY -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY"></script>

<script>
    // 🔥 YOUR FIREBASE CONFIG (COPY FROM FIREBASE CONSOLE)
    const firebaseConfig = {
        apiKey: "AIzaSyDJLDWlFVTJmvlirJSbFwVNq5oDFOt909Y",
        authDomain: "locateme-448db.firebaseapp.com",
        databaseURL: "https://locateme-448db-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "locateme-448db",
        storageBucket: "locateme-448db.firebasestorage.app",
        messagingSenderId: "925140869620",
        appId: "1:925140869620:web:f4038374a0c8ad706ed9a1",
        measurementId: "G-6KQQ3NG32X"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let map, marker, refreshInterval, currentUsername = "";

    async function login() {
        const username = document.getElementById('username').value.trim();
        const pin = document.getElementById('pin').value.trim();
        const errorDiv = document.getElementById('loginError');

        if (!username || !pin) {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "Please enter username and PIN";
            return;
        }

        errorDiv.style.display = "block";
        errorDiv.innerHTML = "Verifying...";

        try {
            const snapshot = await database.ref('users/' + username).once('value');
            const userData = snapshot.val();

            if (userData && userData.pin === pin) {
                currentUsername = username;
                document.getElementById('displayUsername').innerHTML = username;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                initMap();
                await fetchLocation();
                startAutoRefresh();
                errorDiv.style.display = "none";
            } else {
                errorDiv.innerHTML = "❌ Invalid username or PIN";
            }
        } catch (error) {
            errorDiv.innerHTML = "❌ Error: " + error.message;
        }
    }

    function initMap() {
        const defaultLoc = { lat: 28.6139, lng: 77.2090 };
        map = new google.maps.Map(document.getElementById('map'), {
            center: defaultLoc,
            zoom: 15
        });
        marker = new google.maps.Marker({
            position: defaultLoc,
            map: map,
            icon: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png'
        });
    }

    async function fetchLocation() {
        if (!currentUsername) return;
        try {
            const snapshot = await database.ref('users/' + currentUsername).once('value');
            const data = snapshot.val();
            if (data && data.lat && data.lng) {
                const lat = data.lat, lng = data.lng;
                document.getElementById('displayLat').innerHTML = lat.toFixed(6);
                document.getElementById('displayLng').innerHTML = lng.toFixed(6);
                if (data.lastUpdate) {
                    document.getElementById('displayTime').innerHTML = new Date(data.lastUpdate).toLocaleString();
                }
                const pos = { lat: lat, lng: lng };
                map.setCenter(pos);
                marker.setPosition(pos);
                document.getElementById('statusMessage').className = 'status online';
                document.getElementById('statusMessage').innerHTML = '✅ Online - Location updated';
            }
        } catch (error) {
            document.getElementById('statusMessage').innerHTML = '❌ Error fetching location';
        }
    }

    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(() => {
            if (document.getElementById('autoRefresh').checked) fetchLocation();
        }, 5000);
    }

    function logout() {
        if (refreshInterval) clearInterval(refreshInterval);
        currentUsername = "";
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('username').value = "";
        document.getElementById('pin').value = "";
    }
</script>

</body>
</html>
