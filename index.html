<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocateMe - Control Your Phone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        /* Login Container */
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            margin: 80px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-container h2 {
            text-align: center;
            color: #2196F3;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .login-container p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        input:focus {
            border-color: #2196F3;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #1976D2;
            transform: scale(1.02);
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            background: #ffebee;
            border-radius: 8px;
        }
        /* Dashboard */
        .dashboard {
            display: none;
        }
        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h2 {
            color: #2196F3;
        }
        .live-badge {
            background: #ff4444;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        /* Info Card */
        .info-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .location-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .detail-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .detail-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 5px;
        }
        .detail-value {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        /* Map */
        #map {
            height: 300px;
            border-radius: 12px;
            margin-top: 20px;
        }
        /* Control Buttons */
        .controls-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .controls-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .cmd-btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .cmd-btn:hover {
            transform: scale(1.05);
        }
        .btn-lock { background: #FF9800; color: white; }
        .btn-alarm { background: #F44336; color: white; }
        .btn-stop { background: #9E9E9E; color: white; }
        .btn-location { background: #4CAF50; color: white; }
        .btn-camera { background: #673AB7; color: white; }
        .btn-sos { background: #E91E63; color: white; }
        .btn-factory { background: #000; color: white; }
        /* Status */
        .status {
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .online {
            background: #d4edda;
            color: #155724;
        }
        .offline {
            background: #f8d7da;
            color: #721c24;
        }
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        .refresh-btn, .logout-btn {
            width: auto;
            padding: 10px 20px;
        }
        .refresh-btn { background: #4CAF50; }
        .logout-btn { background: #f44336; }
        @media (max-width: 768px) {
            .button-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Section -->
    <div id="loginSection" class="login-container">
        <h2>🔒 LocateMe</h2>
        <p>Control your phone remotely</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="pin" placeholder="PIN" maxlength="6">
        <button onclick="login()">🎮 Control Phone</button>
        <div id="loginError" class="error" style="display:none;"></div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="dashboard">
        <div class="header">
            <h2>📍 LocateMe Control</h2>
            <span class="live-badge">● LIVE</span>
        </div>

        <!-- Location Info -->
        <div class="info-card">
            <h3>📱 Device Location</h3>
            <div class="location-details">
                <div class="detail-item">
                    <div class="detail-label">Username</div>
                    <div class="detail-value" id="displayUsername">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Latitude</div>
                    <div class="detail-value" id="displayLat">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Longitude</div>
                    <div class="detail-value" id="displayLng">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Last Updated</div>
                    <div class="detail-value" id="displayTime">-</div>
                </div>
            </div>
            <div id="map"></div>
        </div>

        <!-- Control Buttons -->
        <div class="controls-section">
            <div class="controls-title">🎮 Remote Controls</div>
            <div class="button-grid">
                <button class="cmd-btn btn-lock" onclick="sendCommand('lock')">🔒 Lock Phone</button>
                <button class="cmd-btn btn-alarm" onclick="sendCommand('alarm')">🔊 Play Alarm</button>
                <button class="cmd-btn btn-stop" onclick="sendCommand('stop')">🔇 Stop Alarm</button>
                <button class="cmd-btn btn-location" onclick="fetchLocation()">📍 Get Location</button>
                <button class="cmd-btn btn-camera" onclick="sendCommand('camera')">📸 Open Camera</button>
                <button class="cmd-btn btn-sos" onclick="sendCommand('sos')">🆘 SOS Alert</button>
                <button class="cmd-btn btn-factory" onclick="sendCommand('factory')">⚠️ Factory Reset</button>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-section">
            <div class="controls-title">⚙️ Settings</div>
            <div class="auto-refresh">
                <input type="checkbox" id="autoRefresh" checked>
                <label>Auto refresh location (5 sec)</label>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="refresh-btn" onclick="fetchLocation()">🔄 Refresh Now</button>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
            <div id="statusMessage" class="status online">✅ Connected - Ready to control</div>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<!-- Google Maps API - Add your API key -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE"></script>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDJLDWlFVTJmvlirJSbFwVNq5oDFOt909Y",
        authDomain: "locateme-448db.firebaseapp.com",
        databaseURL: "https://locateme-448db-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "locateme-448db",
        storageBucket: "locateme-448db.firebasestorage.app",
        messagingSenderId: "925140869620",
        appId: "1:925140869620:web:f4038374a0c8ad706ed9a1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let map, marker, refreshInterval, currentUsername = "";

    async function login() {
        const username = document.getElementById('username').value.trim();
        const pin = document.getElementById('pin').value.trim();
        const errorDiv = document.getElementById('loginError');

        if (!username || !pin) {
            showError("Please enter username and PIN");
            return;
        }

        showError("Verifying...");

        try {
            const snapshot = await database.ref('users/' + username).once('value');
            const userData = snapshot.val();

            if (userData && userData.pin === pin) {
                currentUsername = username;
                document.getElementById('displayUsername').innerHTML = username;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                initMap();
                await fetchLocation();
                startAutoRefresh();
                showError("", false);
            } else {
                showError("Invalid username or PIN");
            }
        } catch (error) {
            showError("Connection error: " + error.message);
        }
    }

    function showError(msg, show = true) {
        const errorDiv = document.getElementById('loginError');
        if (show && msg) {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = msg;
        } else {
            errorDiv.style.display = "none";
        }
    }

    function initMap() {
        const defaultLoc = { lat: 28.6139, lng: 77.2090 };
        if (typeof google === 'undefined') {
            setTimeout(initMap, 500);
            return;
        }
        map = new google.maps.Map(document.getElementById('map'), {
            center: defaultLoc,
            zoom: 15
        });
        marker = new google.maps.Marker({
            position: defaultLoc,
            map: map,
            icon: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png'
        });
    }

    async function fetchLocation() {
        if (!currentUsername) return;
        try {
            const snapshot = await database.ref('users/' + currentUsername).once('value');
            const data = snapshot.val();
            if (data && data.lat && data.lng) {
                document.getElementById('displayLat').innerHTML = data.lat.toFixed(6);
                document.getElementById('displayLng').innerHTML = data.lng.toFixed(6);
                if (data.lastUpdate) {
                    document.getElementById('displayTime').innerHTML = new Date(data.lastUpdate).toLocaleString();
                }
                const pos = { lat: data.lat, lng: data.lng };
                if (map && marker) {
                    map.setCenter(pos);
                    marker.setPosition(pos);
                }
                document.getElementById('statusMessage').className = 'status online';
                document.getElementById('statusMessage').innerHTML = '✅ Online - Location updated';
            }
        } catch (error) {
            document.getElementById('statusMessage').innerHTML = '❌ Error fetching location';
        }
    }

    async function sendCommand(command) {
        if (!currentUsername) return;
        try {
            await database.ref('users/' + currentUsername + '/command').set(command);
            showToast(command + ' command sent!');
            document.getElementById('statusMessage').innerHTML = `✅ ${command} command sent to phone`;
            setTimeout(() => {
                document.getElementById('statusMessage').innerHTML = '✅ Connected - Ready to control';
            }, 2000);
        } catch (error) {
            showToast('Error: ' + error.message);
        }
    }

    function showToast(msg) {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.innerHTML = msg;
        setTimeout(() => {
            if (currentUsername) {
                statusDiv.innerHTML = '✅ Connected - Ready to control';
            }
        }, 3000);
    }

    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(() => {
            if (document.getElementById('autoRefresh').checked) fetchLocation();
        }, 5000);
    }

    function logout() {
        if (refreshInterval) clearInterval(refreshInterval);
        currentUsername = "";
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('username').value = "";
        document.getElementById('pin').value = "";
    }
</script>

</body>
</html>
